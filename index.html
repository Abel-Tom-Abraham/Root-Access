<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abel Tom Abraham | Root Links</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="loader">
        <div class="bat-spinner">
            <i class="fas fa-mask"></i>
        </div>
        <p>Initializing System...</p>
    </div>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="buttons">
                <span class="btn-red"></span>
                <span class="btn-yellow"></span>
                <span class="btn-green"></span>
            </div>
            <div class="title">abel@devops: ~/links</div>
        </div>

        <main class="terminal-body">
            <header class="profile-section">
                <div class="prompt">guest@portfolio:~$ <span class="cmd">whoami</span></div>
                <h1>Abel Tom Abraham</h1>
                <p class="subtitle">Technical Engineer | Linux Expert | Aspiring Dev</p>
            </header>

            <section class="links-section">
                <div class="prompt">guest@portfolio:~$ <span class="cmd">ls --links</span></div>
                
                <div class="links-grid">
                    <a href="https://www.linkedin.com/in/abel-tom-abraham-492994223" target="_blank" class="link-item">
                        <i class="fab fa-linkedin"></i> LinkedIn
                    </a>
                    <a href="#" target="_blank" class="link-item">
                        <i class="fab fa-github"></i> GitHub Code
                    </a>
                    <a href="mailto:abeltom2k03@gmail.com" class="link-item">
                        <i class="fas fa-envelope"></i> Email Me
                    </a>
                    <a href="https://abel-tom-abraham.github.io/Abel_Portfolio/" target="_blank" class="link-item">
                        <i class="fas fa-folder-open"></i> Portfolio
                    </a>
                </div>
            </section>

            <footer class="terminal-footer">
                <div class="prompt">guest@portfolio:~$ <span class="cursor">_</span></div>
            </footer>
        </main>
    </div>

    <script>
        // Hide loader after 2 seconds
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 2000);
        });
    </script>
</body>
</html>
